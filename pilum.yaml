# Scuta deploys itself via Pilum
name: scuta
type: homebrew
description: SID Developer Toolbox - install once, get everything
license: BSL-1.1

homebrew:
  project_url: https://github.com/SID-Technologies/Scuta
  tap_url: https://github.com/SID-Technologies/Homebrew-Scuta
  token_env: GH_TOKEN

build:
  language: go
  version: "1.23"
  version_var: github.com/sid-technologies/scuta/cmd.version
  output: dist/scuta
  env_vars:
    CGO_ENABLED: "0"
  platforms:
    - os: darwin
      arch: amd64
    - os: darwin
      arch: arm64
    - os: linux
      arch: amd64
    - os: linux
      arch: arm64
